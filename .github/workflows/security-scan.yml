# .github/workflows/security-scan.yml

name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Installer Nuclei
        run: |
          curl -L -o nuclei.zip https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_amd64.zip
          unzip nuclei.zip -d /tmp/
          sudo mv /tmp/nuclei /usr/local/bin/
          nuclei -version

      - name: Mettre à jour les templates
        run: nuclei -ut

      - name: Scan Nuclei
        run: |
          mkdir -p python-scanner/rapports
          nuclei -u https://badssl.com -se python-scanner/rapports/nuclei-results.sarif
          
          # Fallback : créer SARIF vide si Nuclei n'a rien généré
          if [ ! -f python-scanner/rapports/nuclei-results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"nuclei","informationUri":"https://github.com/projectdiscovery/nuclei"}},"results":[]}]}' > python-scanner/rapports/nuclei-results.sarif
          fi
          
          ls -la python-scanner/rapports/

      - name: Uploader SARIF v4
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: python-scanner/rapports/nuclei-results.sarif